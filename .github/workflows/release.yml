name: Release

# Cut a release by pushing a version tag (or run `just release X.Y.Z`):
#   git tag v1.0.0 && git push origin v1.0.0
# This builds, signs, notarizes, staples, packages a DMG (the same `just
# package` you can run locally), creates a GitHub Release with the DMG, and
# publishes the marketing site + Sparkle appcast to GitHub Pages.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the release + upload the DMG asset
  pages: write      # publish the appcast to GitHub Pages
  id-token: write   # required by actions/deploy-pages

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout (full history for the git-derived build number)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install tooling
        run: |
          brew install xcodegen just
          # sindresorhus/create-dmg is the npm package, NOT the Homebrew formula.
          npm install -g create-dmg @sentry/cli

      - name: Import Developer ID certificate
        env:
          CERT_B64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Keep the login keychain in the search list too (notary profile lives there).
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"

      - name: Store notarization credentials
        run: |
          xcrun notarytool store-credentials amaranth-notary \
            --apple-id "${{ secrets.NOTARY_APPLE_ID }}" \
            --team-id "${{ secrets.NOTARY_TEAM_ID }}" \
            --password "${{ secrets.NOTARY_PASSWORD }}"

      # Lets `xcodebuild -allowProvisioningUpdates` register the App Group
      # capability and mint Developer ID profiles for the app + Control Center
      # extension. The key must have Admin or App Manager access. Exposes
      # ASC_KEY_PATH to later steps via $GITHUB_ENV; ASC_KEY_ID / ASC_ISSUER_ID
      # are passed into the package step below.
      - name: Prepare App Store Connect API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          KEY_DIR="$RUNNER_TEMP/asc"
          mkdir -p "$KEY_DIR"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$KEY_DIR/AuthKey.p8"
          echo "ASC_KEY_PATH=$KEY_DIR/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build, sign, notarize and package
        env:
          # App Store Connect API key for automatic Developer ID provisioning
          # (ASC_KEY_PATH comes from the step above via $GITHUB_ENV).
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          # Sparkle signs the appcast from this secret (piped via --ed-key-file -).
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          # sentry-cli uploads dSYMs + marks the release from these (optional).
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: just package "${{ steps.version.outputs.version }}"

      - name: Create the GitHub release and upload the DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Amaranth ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release/Amaranth-*.dmg
          fail_on_unmatched_files: true

      # Pages serves BOTH the marketing site and the appcast, and a deploy
      # replaces the whole site — so assemble them together. `just pages` builds
      # the Astro site and bundles THIS release's freshly generated appcast.xml
      # (release/appcast/appcast.xml, just produced above) into site/dist.
      - name: Build the site + bundle the fresh appcast for Pages
        run: just pages

      - name: Upload the site + appcast as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Self-heal: re-enables Pages (GitHub Actions source) if it's been
      # disabled. The github-pages environment + its v* tag deploy policy
      # persist independently, so releases keep deploying without manual setup.
      - name: Ensure GitHub Pages is enabled
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Deploy the site + appcast to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
