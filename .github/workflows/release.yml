name: Release

# Cut a release by pushing a version tag (or run `just release X.Y.Z`):
#   git tag v1.0.0 && git push origin v1.0.0
# This builds, signs, notarizes, staples, packages a DMG (the same `just
# package` you can run locally), creates a GitHub Release with the DMG, and
# publishes the Sparkle appcast to GitHub Pages.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the release + upload the DMG asset
  pages: write      # publish the appcast to GitHub Pages
  id-token: write   # required by actions/deploy-pages

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout (full history for the git-derived build number)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install tooling
        run: |
          brew install xcodegen just
          # sindresorhus/create-dmg is the npm package, NOT the Homebrew formula.
          npm install -g create-dmg @sentry/cli

      - name: Import Developer ID certificate
        env:
          CERT_B64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Keep the login keychain in the search list too (notary profile lives there).
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"

      - name: Store notarization credentials
        run: |
          xcrun notarytool store-credentials amaranth-notary \
            --apple-id "${{ secrets.NOTARY_APPLE_ID }}" \
            --team-id "${{ secrets.NOTARY_TEAM_ID }}" \
            --password "${{ secrets.NOTARY_PASSWORD }}"

      - name: Build, sign, notarize and package
        env:
          # Sparkle signs the appcast from this secret (piped via --ed-key-file -).
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          # sentry-cli uploads dSYMs + marks the release from these (optional).
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: just package "${{ steps.version.outputs.version }}"

      - name: Create the GitHub release and upload the DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Amaranth ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release/Amaranth-*.dmg
          fail_on_unmatched_files: true

      - name: Upload the appcast as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/appcast

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy the appcast to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
